# =============================================================================
# TinyBrain Gateway — Docker 环境配置
# =============================================================================

server:
  port: 8088

spring:
  # Redis（限流用）
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      routes:
        # 用户服务路由（Docker 环境直连）
        - id: user-service
          uri: http://tinybrain-app:8080
          predicates:
            - Path=/api/auth/**
        # 知识库服务路由
        - id: knowledge-service
          uri: http://tinybrain-app:8080
          predicates:
            - Path=/api/documents/**
        # RAG 服务路由
        - id: rag-service
          uri: http://tinybrain-app:8080
          predicates:
            - Path=/api/rag/**
        # Agent 服务路由
        - id: agent-service
          uri: http://tinybrain-app:8080
          predicates:
            - Path=/api/agent/**
        # Swagger UI
        - id: openapi
          uri: http://tinybrain-app:8080
          predicates:
            - Path=/v3/api-docs/**, /swagger-ui/**, /swagger-ui.html
    # 禁用 Nacos
    nacos:
      discovery:
        enabled: false

logging:
  level:
    com.tinybrain: INFO
