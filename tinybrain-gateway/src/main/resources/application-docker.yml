# =============================================================================
# TinyBrain Gateway — Docker 环境配置
# =============================================================================

server:
  port: 8088

spring:
  # Redis（限流用）
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      routes:
        # 所有 API 请求统一代理到 tinybrain-app 容器
        - id: app-api
          uri: http://tinybrain-app:8080
          predicates:
            - Path=/api/**
        # Swagger UI
        - id: openapi
          uri: http://tinybrain-app:8080
          predicates:
            - Path=/v3/api-docs/**, /swagger-ui/**, /swagger-ui.html

      # 限流过滤器
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200

    # 禁用 Nacos
    nacos:
      discovery:
        enabled: false

logging:
  level:
    com.tinybrain: INFO
