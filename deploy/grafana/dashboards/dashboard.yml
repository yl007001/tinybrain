# =============================================================================
# Grafana — Dashboard 自动加载配置
# =============================================================================
apiVersion: 1

providers:
  - name: 'TinyBrain'
    orgId: 1
    folder: 'TinyBrain'
    type: file
    disableDeletion: true
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
