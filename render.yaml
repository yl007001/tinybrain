# TinyBrain Render 部署配置
# https://render.com 免费层部署
# 使用 H2 内存数据库，无需 MySQL/Redis/ES
# LLM 功能需设置环境变量 AI_DASHSCOPE_API_KEY

services:
  - type: web
    name: tinybrain
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests -pl tinybrain-app -am
    startCommand: cd tinybrain-app && java -jar target/*.jar --spring.profiles.active=dev
    envVars:
      - key: AI_DASHSCOPE_API_KEY
        value: your-api-key-here
      - key: TINYBRAIN_LLM_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: dev
    healthCheckPath: /actuator/health
