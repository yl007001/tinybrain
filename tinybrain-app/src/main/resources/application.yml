server:
  port: 8080

spring:
  application:
    name: tinybrain

  profiles:
    active: dev

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tinybrain?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # Jackson 日期格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # Redis 配置（开发环境无 Redis 不影响启动）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tinybrain.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Spring Boot Actuator（健康检查+指标暴露+链路追踪）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0  # 开发环境全量采样，生产环境可改为 0.1
    propagation:
      type: w3c

# ========== SpringDoc OpenAPI ==========
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha
  packages-to-scan: com.tinybrain
  show-actuator: true

# ========== LLM API 配置 ==========
tinybrain:
  llm:
    api-key: ${TINYBRAIN_LLM_KEY:sk-your-api-key-here}
    base-url: https://api.deepseek.com
    timeout: 30000

  # 向量存储配置
  vectorstore:
    data-dir: ${TINYBRAIN_VECTORSTORE_DIR:./data/vectorstore}

  # 搜索引擎配置（可选）
  search:
    api-key: ${TINYBRAIN_SEARCH_API_KEY:}
    api-url: https://serpapi.com

# Resilience4j 容错配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
    instances:
      llmApi:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 1s
    instances:
      llmApi:
        base-config: default
  ratelimiter:
    instances:
      llmApi:
        limit-for-period: 20
        limit-refresh-period: 1m
        timeout-duration: 3s

# 日志配置
logging:
  level:
    com.tinybrain: DEBUG
    org.springframework.security: INFO
