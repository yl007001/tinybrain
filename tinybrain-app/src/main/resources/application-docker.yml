# =============================================================================
# TinyBrain — Docker 环境配置
# =============================================================================
# 此配置文件在使用 docker-compose 时自动激活。
# 使用 Docker 服务名连接依赖组件，无需安装 Nacos。
# =============================================================================

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/tinybrain?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: tinybrain2026
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  # 跳过 H2 初始化
  sql:
    init:
      mode: never
  # 禁用 H2 控制台
  h2:
    console:
      enabled: false
  # Elasticsearch
  elasticsearch:
    uris: http://elasticsearch:9200
  # Redis（Gateway 限流用）
  data:
    redis:
      host: redis
      port: 6379

# 不使用 Nacos
spring.cloud.nacos.discovery.enabled: false

# 日志：JSON 格式输出到控制台
logging:
  level:
    com.tinybrain: INFO
    org.springframework.security: WARN
