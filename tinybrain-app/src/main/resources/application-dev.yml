spring:
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java

  # 开发环境使用 H2 文件数据库（数据持久化，重启不丢失）
  # 生产环境请切换为 MySQL 配置
  datasource:
    url: jdbc:h2:file:./data/tinybrain;DB_CLOSE_DELAY=-1;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # 初始化表结构
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

mybatis-plus:
  configuration:
    # 开发环境打印 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.tinybrain: DEBUG
